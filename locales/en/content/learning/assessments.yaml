version: '1.1'
pass_threshold_pct: 70
weights:
  m1: 0.05
  m2: 0.05
  m3: 0.05
  m4: 0.3
  m5: 0.25
  m6: 0.3
modules:
- id: m1
  week: 1
  weight: 0.05
  competencies:
  - C1
  - C6
  title:
    es: Semana 1 — EWS clásicas, CSD y límites
    en: Week 1 — Classical EWS, CSD and limits
    fr: Semaine 1 — EWS classiques, CSD et limites
  description:
    es: Evaluación formativa sobre indicadores tempranos univariados, critical slowing down y alcance
      ético.
    en: Formative quiz on univariate early-warning signals, critical slowing down, and ethical scope.
    fr: Quiz formatif sur les signaux d’alerte univariés, le critical slowing down et le périmètre éthique.
  questions:
  - id: m1_q1
    type: mcq
    points: 1
    prompt:
      es: ¿Qué miden típicamente las EWS clásicas (varianza, AR(1)) en series univariadas?
      en: What do classical EWS (variance, AR(1)) typically measure in univariate series?
      fr: Que mesurent typiquement les EWS classiques (variance, AR(1)) sur des séries univariées ?
    choices:
    - id: a
      text:
        es: El acoplamiento ordinal entre dos o más canales
        en: Ordinal coupling between two or more channels
        fr: Le couplage ordinal entre deux canaux ou plus
    - id: b
      text:
        es: Cambios en la dinámica de un solo proceso (p.ej. fluctuaciones / memoria local)
        en: Changes in a single process (e.g. fluctuations / local memory)
        fr: Des changements d’un seul processus (fluctuations / mémoire locale)
    - id: c
      text:
        es: La causalidad direccional entre variables clínicas
        en: Directional causality between clinical variables
        fr: La causalité directionnelle entre variables cliniques
    - id: d
      text:
        es: El valor predictivo positivo de un dispositivo médico
        en: Positive predictive value of a medical device
        fr: La valeur prédictive positive d’un dispositif médical
    correct: b
    explanation:
      es: Var y AR(1) son paneles univariados; no miden por sí solos reorganización relacional entre canales.
      en: Variance and AR(1) are univariate panels; they alone do not measure cross-channel relational
        reorganization.
      fr: Variance et AR(1) sont univariés ; ils ne mesurent pas seuls la réorganisation relationnelle
        entre canaux.
  - id: m1_q2
    type: mcq
    points: 1
    prompt:
      es: 'Una limitación conceptual importante de las EWS clásicas es:'
      en: 'An important conceptual limit of classical EWS is:'
      fr: 'Une limite conceptuelle importante des EWS classiques est :'
    choices:
    - id: a
      text:
        es: Que siempre predicen el colapso con p < 0.05
        en: That they always predict collapse with p < 0.05
        fr: Qu’elles prédisent toujours l’effondrement avec p < 0,05
    - id: b
      text:
        es: Ambigüedad de signo e interpretación (var↑ no siempre = misma narrativa de riesgo)
        en: Sign ambiguity and interpretation (↑variance ≠ one universal risk story)
        fr: L’ambiguïté de signe et d’interprétation (↑variance ≠ un récit de risque unique)
    - id: c
      text:
        es: Que solo funcionan con m=7 de Bandt–Pompe
        en: That they only work with Bandt–Pompe m=7
        fr: Qu’elles ne marchent qu’avec Bandt–Pompe m=7
    - id: d
      text:
        es: Que requieren obligatoriamente TDA / Betti
        en: That they mandatorily require TDA / Betti numbers
        fr: Qu’elles exigent obligatoirement la TDA / Betti
    correct: b
    explanation:
      es: El mismo aumento de varianza puede corresponder a regímenes distintos; no sustituye una pregunta
        relacional.
      en: The same variance rise can map to different regimes; it does not replace a relational question.
      fr: La même hausse de variance peut correspondre à des régimes différents ; elle ne remplace pas
        une question relationnelle.
  - id: m1_q3
    type: mcq
    points: 1
    prompt:
      es: 'Critical slowing down (CSD) se asocia conceptualmente con:'
      en: 'Critical slowing down (CSD) is conceptually associated with:'
      fr: 'Le critical slowing down (CSD) est conceptuellement associé à :'
    choices:
    - id: a
      text:
        es: Recuperación más lenta ante perturbaciones cerca de una transición
        en: Slower recovery from perturbations near a transition
        fr: Un retour plus lent après perturbation près d’une transition
    - id: b
      text:
        es: Aumento garantizado de τ_s entre todos los pares de variables
        en: Guaranteed increase of τ_s for every variable pair
        fr: Une hausse garantie de τ_s pour toutes les paires de variables
    - id: c
      text:
        es: Eliminación de la necesidad de nulos / surrogates
        en: Removing the need for nulls / surrogates
        fr: La suppression du besoin de nulls / surrogates
    - id: d
      text:
        es: Validación clínica automática de un algoritmo de UCI
        en: Automatic clinical validation of an ICU algorithm
        fr: La validation clinique automatique d’un algorithme de réanimation
    correct: a
    explanation:
      es: CSD describe recuperación lenta cerca de umbrales; no equivale a un dispositivo clínico validado.
      en: CSD describes slow recovery near thresholds; it is not a validated clinical device claim.
      fr: Le CSD décrit un retour lent près d’un seuil ; ce n’est pas une validation clinique de dispositif.
  - id: m1_q4
    type: mcq
    points: 1
    prompt:
      es: 'Según el alcance de STP v1.0, el software se presenta como:'
      en: 'Under STP v1.0 scope, the software is presented as:'
      fr: 'Selon le périmètre STP v1.0, le logiciel est présenté comme :'
    choices:
    - id: a
      text:
        es: Dispositivo médico de alarma de FV en tiempo real
        en: Real-time VF alarm medical device
        fr: Dispositif médical d’alarme FV en temps réel
    - id: b
      text:
        es: Herramienta de investigación y docencia para análisis ordinal / relacional
        en: Research and teaching tool for ordinal / relational analysis
        fr: Outil de recherche et d’enseignement pour l’analyse ordinale / relationnelle
    - id: c
      text:
        es: Sistema de trading algorítmico certificado
        en: Certified algorithmic trading system
        fr: Système de trading algorithmique certifié
    - id: d
      text:
        es: Sustituto de vigilancia epidemiológica operativa
        en: Replacement for operational epidemiological surveillance
        fr: Remplaçant de la surveillance épidémiologique opérationnelle
    correct: b
    explanation:
      es: STP es plataforma educativa/de investigación; no es producto clínico ni financiero regulado.
      en: STP is an educational/research platform; not a regulated clinical or financial product.
      fr: STP est une plateforme éducative/recherche ; pas un produit clinique ou financier réglementé.
  - id: m1_q5
    type: mcq
    points: 1
    prompt:
      es: 'Una pregunta relacional bien formulada se centra en:'
      en: 'A well-posed relational question focuses on:'
      fr: 'Une question relationnelle bien posée porte sur :'
    choices:
    - id: a
      text:
        es: Si solo sube la media de una variable
        en: Whether only the mean of one variable rises
        fr: Si seule la moyenne d’une variable augmente
    - id: b
      text:
        es: Si se reorganiza el acoplamiento / coordinación entre canales en torno a un evento o tramo
        en: Whether coupling / coordination between channels reorganizes around an event or segment
        fr: Si le couplage / la coordination entre canaux se réorganise autour d’un événement ou segment
    - id: c
      text:
        es: Si el p-valor de un test t es menor que 0.05
        en: Whether a t-test p-value is below 0.05
        fr: Si la p-valeur d’un test t est inférieure à 0,05
    - id: d
      text:
        es: Si el modelo de deep learning alcanza 99% de accuracy
        en: Whether a deep-learning model reaches 99% accuracy
        fr: Si un modèle de deep learning atteint 99 % d’accuracy
    correct: b
    explanation:
      es: 'Competencia C1: pregunta relacional ≠ solo univariada.'
      en: 'Competency C1: relational question ≠ univariate-only question.'
      fr: 'Compétence C1 : question relationnelle ≠ question purement univariée.'
  - id: m1_q6
    type: mcq
    points: 1
    prompt:
      es: 'En una tabla de resultados de Lab aparece: Δvar = +0.8 (sube), ΔAR1 = −0.3 (baja). La lectura
        más honesta es:'
      en: 'A Lab results table shows: Δvar = +0.8 (up), ΔAR1 = −0.3 (down). The most honest reading is:'
      fr: 'Un tableau de résultats Lab montre : Δvar = +0,8 (↑), ΔAR1 = −0,3 (↓). La lecture la plus honnête
        est :'
    choices:
    - id: a
      text:
        es: Prueba definitiva de critical slowing down clásico en todos los sentidos
        en: Definitive proof of classical critical slowing down in every sense
        fr: Preuve définitive de critical slowing down classique dans tous les sens
    - id: b
      text:
        es: 'Panel clásico ambiguo: un indicador sube y otro baja; no cierra solo la pregunta relacional'
        en: 'Ambiguous classical panel: one indicator rises, another falls; it does not alone close the
          relational question'
        fr: 'Panneau classique ambigu : un indicateur monte, l’autre baisse ; il ne clôt pas seul la question
          relationnelle'
    - id: c
      text:
        es: Obliga a declarar predicción clínica
        en: Forces a clinical prediction claim
        fr: Oblige à déclarer une prédiction clinique
    - id: d
      text:
        es: Demuestra que τ_s es innecesario
        en: Proves that τ_s is unnecessary
        fr: Prouve que τ_s est inutile
    correct: b
    explanation:
      es: 'Ítem de interpretación de tabla: ambigüedad clásica motiva la lectura dual.'
      en: 'Table-interpretation item: classical ambiguity motivates dual reading.'
      fr: 'Item d’interprétation de tableau : l’ambiguïté classique motive la lecture duale.'
  - id: m1_q7
    type: mcq
    points: 1
    prompt:
      es: 'El software STP se usa legítimamente en posgrado para:'
      en: 'STP software is legitimately used in graduate training to:'
      fr: 'Le logiciel STP s’utilise légitimement en formation de 3e cycle pour :'
    choices:
    - id: a
      text:
        es: Enseñar gramática ordinal/relacional, nulos y claims acotados
        en: Teach ordinal/relational grammar, nulls and bounded claims
        fr: Enseigner la grammaire ordinale/relationnelle, les nulls et les claims bornés
    - id: b
      text:
        es: Sustituir comités de ética institucionales
        en: Replace institutional ethics boards
        fr: Remplacer les comités d’éthique institutionnels
    - id: c
      text:
        es: Certificar dispositivos médicos
        en: Certify medical devices
        fr: Certifier des dispositifs médicaux
    - id: d
      text:
        es: Publicar señales de trading sin revisión
        en: Publish trading signals without review
        fr: Publier des signaux de trading sans revue
    correct: a
    explanation:
      es: Uso legítimo = investigación y docencia metodológica.
      en: Legitimate use = methodological research and teaching.
      fr: Usage légitime = recherche et enseignement méthodologiques.
  - id: m1_q8
    type: mcq
    points: 1
    prompt:
      es: Una figura muestra solo la traza univariada de casos de dengue con un umbral. ¿Qué falta para
        una pregunta STP?
      en: A figure shows only the univariate dengue-cases trace with a threshold. What is missing for
        an STP question?
      fr: Une figure ne montre que la trace univariée des cas de dengue avec un seuil. Que manque-t-il
        pour une question STP ?
    choices:
    - id: a
      text:
        es: 'Nada: el umbral basta para reorganización relacional'
        en: 'Nothing: the threshold suffices for relational reorganization'
        fr: 'Rien : le seuil suffit pour la réorganisation relationnelle'
    - id: b
      text:
        es: Canales multivariados (p.ej. clima), diseño de evento y contraste ordinal/nulos
        en: Multivariate channels (e.g. climate), event design and ordinal/null contrast
        fr: Canaux multivariés (p.ex. climat), design d’événement et contraste ordinal/nulls
    - id: c
      text:
        es: Solo un color más bonito en la figura
        en: Only a prettier colour on the figure
        fr: Seulement une plus jolie couleur sur la figure
    - id: d
      text:
        es: Obligatoriamente TDA/Betti
        en: Mandatory TDA/Betti
        fr: TDA/Betti obligatoire
    correct: b
    explanation:
      es: 'Ítem de interpretación de figura: univariado+umbral ≠ pregunta relacional STP.'
      en: 'Figure-interpretation item: univariate+threshold ≠ STP relational question.'
      fr: 'Item d’interprétation de figure : univarié+seuil ≠ question relationnelle STP.'
  - id: m1_q9
    type: mcq
    points: 1
    prompt:
      es: ¿Cuál es un prerrequisito razonable del curso de 6 semanas?
      en: Which is a reasonable prerequisite for the 6-week course?
      fr: Quel est un prérequis raisonnable du cours de 6 semaines ?
    choices:
    - id: a
      text:
        es: Series temporales o estadística intermedia y lectura de gráficos científicos
        en: Time series or intermediate statistics and reading scientific graphics
        fr: Séries temporelles ou statistique intermédiaire et lecture de graphiques scientifiques
    - id: b
      text:
        es: Licencia de médico especialista en arritmias
        en: Specialist cardiology licence in arrhythmias
        fr: Licence de médecin spécialiste en arythmies
    - id: c
      text:
        es: Certificación de trader profesional
        en: Professional trader certification
        fr: Certification de trader professionnel
    - id: d
      text:
        es: Dominio de ripser en producción
        en: Production mastery of ripser
        fr: Maîtrise de ripser en production
    correct: a
    explanation:
      es: 'Syllabus §3: base cuantitativa intermedia, no credencial clínica.'
      en: 'Syllabus §3: intermediate quantitative base, not a clinical credential.'
      fr: 'Syllabus §3 : base quantitative intermédiaire, pas une accréditation clinique.'
- id: m2
  week: 2
  weight: 0.05
  competencies:
  - C2
  - C3
  - C6
  title:
    es: Semana 2 — Bandt–Pompe y Systemic Tau (τ_s)
    en: Week 2 — Bandt–Pompe and Systemic Tau (τ_s)
    fr: Semaine 2 — Bandt–Pompe et Tau systémique (τ_s)
  description:
    es: Patrones ordinales, τ_s en ventana, controles sintéticos y reproducibilidad (hash).
    en: Ordinal patterns, windowed τ_s, synthetic controls, and reproducibility (hash).
    fr: Motifs ordinaux, τ_s en fenêtre, contrôles synthétiques et reproductibilité (hash).
  questions:
  - id: m2_q1
    type: mcq
    points: 1
    prompt:
      es: 'Los patrones Bandt–Pompe codifican principalmente:'
      en: 'Bandt–Pompe patterns primarily encode:'
      fr: 'Les motifs Bandt–Pompe encodent surtout :'
    choices:
    - id: a
      text:
        es: La amplitud absoluta en unidades físicas
        en: Absolute amplitude in physical units
        fr: L’amplitude absolue en unités physiques
    - id: b
      text:
        es: El orden relativo (ranking) de valores en un embedding de retardo
        en: Relative order (ranking) of values in a delay embedding
        fr: L’ordre relatif (classement) des valeurs dans un plongement à retard
    - id: c
      text:
        es: La etiqueta clínica del paciente
        en: The patient’s clinical label
        fr: L’étiquette clinique du patient
    - id: d
      text:
        es: El hash SHA-256 del archivo CSV
        en: The SHA-256 hash of the CSV file
        fr: Le hash SHA-256 du fichier CSV
    correct: b
    explanation:
      es: 'Bandt–Pompe es ordinal: ranks locales, no la escala bruta de la serie.'
      en: 'Bandt–Pompe is ordinal: local ranks, not the raw scale of the series.'
      fr: 'Bandt–Pompe est ordinal : rangs locaux, pas l’échelle brute de la série.'
  - id: m2_q2
    type: mcq
    points: 1
    prompt:
      es: 'Systemic Tau (τ_s) se interpreta mejor como:'
      en: 'Systemic Tau (τ_s) is best interpreted as:'
      fr: 'Le Tau systémique (τ_s) s’interprète mieux comme :'
    choices:
    - id: a
      text:
        es: Un termómetro de acoplamiento ordinal entre canales en ventanas
        en: A thermometer of ordinal coupling between channels in windows
        fr: Un thermomètre de couplage ordinal entre canaux en fenêtres
    - id: b
      text:
        es: La probabilidad de muerte súbita a 24 h
        en: 24-hour sudden-death probability
        fr: La probabilité de mort subite à 24 h
    - id: c
      text:
        es: El precio futuro de un activo financiero
        en: The future price of a financial asset
        fr: Le prix futur d’un actif financier
    - id: d
      text:
        es: Un sustituto de la frecuencia cardíaca media
        en: A substitute for mean heart rate
        fr: Un substitut de la fréquence cardiaque moyenne
    correct: a
    explanation:
      es: τ_s resume acoplamiento ordinal; no es un endpoint clínico ni de mercado.
      en: τ_s summarizes ordinal coupling; it is not a clinical or market endpoint.
      fr: τ_s résume le couplage ordinal ; ce n’est pas un critère clinique ni de marché.
  - id: m2_q3
    type: mcq
    points: 1
    prompt:
      es: 'En el diseño pedagógico STP, `synthetic_coupled_logistic` vs `synthetic_ar_noise` sirven para:'
      en: 'In STP pedagogy, `synthetic_coupled_logistic` vs `synthetic_ar_noise` serve to:'
      fr: 'En pédagogie STP, `synthetic_coupled_logistic` vs `synthetic_ar_noise` servent à :'
    choices:
    - id: a
      text:
        es: Reemplazar todos los datos clínicos reales
        en: Replace all real clinical data
        fr: Remplacer toutes les données cliniques réelles
    - id: b
      text:
        es: Contrastar un control positivo de switch de acoplamiento con un casi-nulo
        en: Contrast a positive coupling-switch control with a near-null control
        fr: Contraster un contrôle positif de bascule de couplage avec un quasi-nul
    - id: c
      text:
        es: Calcular Φ₃ sin necesidad de ventana
        en: Compute Φ₃ without any window
        fr: Calculer Φ₃ sans aucune fenêtre
    - id: d
      text:
        es: Validar un ETF de volatilidad
        en: Validate a volatility ETF
        fr: Valider un ETF de volatilité
    correct: b
    explanation:
      es: Semana 2 exige contraste positivo vs casi-nulo antes del ancla empírica.
      en: Week 2 requires positive vs near-null contrast before the empirical anchor.
      fr: La semaine 2 exige le contraste positif vs quasi-nul avant l’ancre empirique.
  - id: m2_q4
    type: mcq
    points: 1
    prompt:
      es: 'El hash de reproducibilidad (SHA-256) en el Lab documenta principalmente:'
      en: 'The Lab reproducibility hash (SHA-256) mainly documents:'
      fr: 'Le hash de reproductibilité (SHA-256) du Lab documente surtout :'
    choices:
    - id: a
      text:
        es: Que el resultado es causalmente verdadero en la población
        en: That the result is causally true in the population
        fr: Que le résultat est causalement vrai dans la population
    - id: b
      text:
        es: Una huella de datos + parámetros + pipeline para que un par pueda rehacer la corrida
        en: A fingerprint of data + parameters + pipeline so a peer can redo the run
        fr: Une empreinte données + paramètres + pipeline pour qu’un pair refasse la course
    - id: c
      text:
        es: La aprobación ética del comité hospitalario
        en: Hospital IRB ethical approval
        fr: L’approbation éthique du comité hospitalier
    - id: d
      text:
        es: El score de un examen estandarizado nacional
        en: A national standardized exam score
        fr: Le score d’un examen national standardisé
    correct: b
    explanation:
      es: 'Competencia C6: Methods + hash + export, no prueba causal universal.'
      en: 'Competency C6: Methods + hash + export, not universal causal proof.'
      fr: 'Compétence C6 : Methods + hash + export, pas une preuve causale universelle.'
  - id: m2_q5
    type: mcq
    points: 1
    prompt:
      es: 'Para un primer Lab formativo de τ_s, una práctica recomendada es:'
      en: 'For a first formative τ_s Lab, a recommended practice is:'
      fr: 'Pour un premier Lab formatif de τ_s, une pratique recommandée est :'
    choices:
    - id: a
      text:
        es: Usar modo Full con TDA y breathing sin leer el panel núcleo
        en: Use Full mode with TDA and breathing without reading the core panel
        fr: Utiliser le mode Full avec TDA et breathing sans lire le panneau noyau
    - id: b
      text:
        es: Fijar preset/W/stride coherentes, n_surr ≥ 8 y comparar con un control casi-nulo
        en: Set coherent preset/W/stride, n_surr ≥ 8, and compare to a near-null control
        fr: Fixer preset/W/stride cohérents, n_surr ≥ 8 et comparer à un quasi-nul
    - id: c
      text:
        es: Reportar solo el p-valor más pequeño sin Δτ_s
        en: Report only the smallest p-value without Δτ_s
        fr: Ne rapporter que la plus petite p-valeur sans Δτ_s
    - id: d
      text:
        es: Cambiar el seed hasta obtener el resultado deseado sin documentarlo
        en: Change the seed until the desired result appears without documenting it
        fr: Changer la graine jusqu’au résultat souhaité sans le documenter
    correct: b
    explanation:
      es: 'El núcleo pedagógico: parámetros justificados + nulos + contraste de controles.'
      en: 'Pedagogical core: justified parameters + nulls + control contrast.'
      fr: 'Noyau pédagogique : paramètres justifiés + nulls + contraste de contrôles.'
  - id: m2_q6
    type: mcq
    points: 1
    prompt:
      es: 'Una tabla reporta: m=3, W=101, stride=5, repro_hash=abc…, n_surr=0. ¿Qué falta para un claim
        de nulo?'
      en: 'A table reports: m=3, W=101, stride=5, repro_hash=abc…, n_surr=0. What is missing for a null
        claim?'
      fr: 'Un tableau rapporte : m=3, W=101, stride=5, repro_hash=abc…, n_surr=0. Que manque-t-il pour
        un claim de null ?'
    choices:
    - id: a
      text:
        es: Surrogates (n_surr>0) o declaración explícita de que no se contrastó nulo
        en: Surrogates (n_surr>0) or an explicit statement that no null was tested
        fr: Surrogates (n_surr>0) ou déclaration explicite qu’aucun null n’a été testé
    - id: b
      text:
        es: 'Nada: el hash basta como p-valor'
        en: 'Nothing: the hash suffices as a p-value'
        fr: 'Rien : le hash suffit comme p-valeur'
    - id: c
      text:
        es: Solo cambiar m a 7
        en: Only change m to 7
        fr: Seulement passer m à 7
    - id: d
      text:
        es: Borrar el hash
        en: Delete the hash
        fr: Effacer le hash
    correct: a
    explanation:
      es: Hash ≠ nulo. n_surr=0 exige transparencia.
      en: Hash ≠ null. n_surr=0 requires transparency.
      fr: Hash ≠ null. n_surr=0 exige la transparence.
  - id: m2_q7
    type: mcq
    points: 1
    prompt:
      es: 'El control sintético `synthetic_ar_noise` se usa principalmente para:'
      en: 'The synthetic control `synthetic_ar_noise` is mainly used to:'
      fr: 'Le contrôle synthétique `synthetic_ar_noise` sert surtout à :'
    choices:
    - id: a
      text:
        es: Simular un switch de acoplamiento fuerte
        en: Simulate a strong coupling switch
        fr: Simuler un fort basculement de couplage
    - id: b
      text:
        es: 'Casi-nulo: esperar |Δτ_s| pequeño si no hay transición diseñada'
        en: 'Near-null: expect small |Δτ_s| when no transition is designed'
        fr: 'Quasi-null : attendre un |Δτ_s| petit s’il n’y a pas de transition conçue'
    - id: c
      text:
        es: Validar un dispositivo de FV
        en: Validate a VF device
        fr: Valider un dispositif de FV
    - id: d
      text:
        es: Entrenar un modelo de trading
        en: Train a trading model
        fr: Entraîner un modèle de trading
    correct: b
    explanation:
